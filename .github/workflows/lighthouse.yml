name: Lighthouse CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lighthouse-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lighthouse-
            ${{ runner.os }}-cargo-

      - name: Install cargo-leptos
        run: cargo install cargo-leptos

      - name: Install Tailwind CSS
        run: npm install -g @tailwindcss/cli

      - name: Build release
        run: cargo leptos build --release

      - name: Start server
        run: |
          LEPTOS_SITE_ADDR="0.0.0.0:8080" \
          LEPTOS_SITE_ROOT="target/site" \
          DATABASE_URL="sqlite:lighthouse_test.db?mode=rwc" \
          RUST_LOG="error" \
          ./target/release/gabriel-osemberg &
          sleep 5

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/projects
          budgetPath: ./budget.json
          uploadArtifacts: true

      - name: Report scores
        if: always()
        run: |
          echo "### Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          echo "See uploaded artifacts for full reports." >> $GITHUB_STEP_SUMMARY
