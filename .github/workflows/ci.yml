name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (SSR)
        run: cargo clippy --no-default-features --features=ssr -- -D warnings

      - name: Clippy (hydrate)
        run: cargo clippy --no-default-features --features=hydrate --target=wasm32-unknown-unknown -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --no-default-features --features=ssr

  build:
    name: Build (cargo-leptos)
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Install cargo-leptos
        run: cargo install cargo-leptos

      - name: Install Tailwind CSS
        run: npm install -g @tailwindcss/cli

      - name: Build release
        run: cargo leptos build --release

      - name: Report WASM size
        run: |
          WASM_FILE=$(find target/site/pkg -name "*.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            SIZE=$(stat -c%s "$WASM_FILE")
            GZIP_SIZE=$(gzip -c "$WASM_FILE" | wc -c)
            echo "### WASM Bundle Size" >> $GITHUB_STEP_SUMMARY
            echo "- Raw: $(numfmt --to=iec-i --suffix=B $SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "- Gzipped: $(numfmt --to=iec-i --suffix=B $GZIP_SIZE)" >> $GITHUB_STEP_SUMMARY
          fi
