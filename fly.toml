# Fly.io configuration for gabriel-osemberg
# See: https://fly.io/docs/reference/configuration/

app = "gabriel-osemberg"
primary_region = "iad"

[build]

[env]
  LEPTOS_SITE_ADDR = "0.0.0.0:8080"
  LEPTOS_SITE_ROOT = "site"
  RUST_LOG = "info"
  DATABASE_URL = "sqlite:/data/gabriel_osemberg.db?mode=rwc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[mounts]
  source = "sqlite_data"
  destination = "/data"
